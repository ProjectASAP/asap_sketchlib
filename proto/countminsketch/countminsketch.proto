// countminsketch.proto — Portable wire format for Count-Min Sketch state.

syntax = "proto3";

package sketchlib.v1;

import "common/common.proto";

option go_package = "github.com/ProjectASAP/sketchlib-go/proto/countminsketch;countminsketchpb";

// ============================================================================
// Count-Min Sketch
// ============================================================================

// CountMinState is the portable state of a Count-Min Sketch.
//
// The counter matrix is stored flat in row-major order:
//   element [r][c] is at index r * cols + c.
//
// The Go implementation tracks auxiliary sum/L1/L2 arrays that the Rust
// implementation does not produce. These fields are optional; consumers
// that need them must recompute from raw insertions if absent.
message CountMinState {
  // Matrix dimensions. Both must be > 0.
  uint32 rows = 1;
  uint32 cols = 2;

  // Indicates which counts_* field below is populated.
  CounterType counter_type = 3;

  // Integer counters in row-major order, length = rows * cols.
  // Populated when counter_type ∈ {INT32, INT64}.
  // Use sint64 for efficient varint encoding of near-zero values.
  // For INT128 counters, values are interleaved as (hi_i, lo_i) pairs,
  // making the effective length 2 * rows * cols.
  repeated sint64 counts_int = 4 [packed = true];

  // Floating-point counters in row-major order, length = rows * cols.
  // Populated when counter_type = FLOAT64 (Go producer).
  repeated double counts_float = 5 [packed = true];

  // ---- Optional Go-extension fields ----------------------------------------
  // These are produced by sketchlib-go and absent from asap_sketchlib producers.
  // Consumers should treat absence as "unknown; recompute if needed".

  // Sum-weighted counter matrix (same layout as counts_*), length = rows * cols.
  repeated double sum_counts = 6 [packed = true];

  // Sum-of-squares counter matrix, length = rows * cols.
  repeated double sum2_counts = 7 [packed = true];

  // Per-row L1 norms, length = rows.
  repeated double l1 = 8 [packed = true];

  // Per-row L2 norms, length = rows. Recompute if absent.
  repeated double l2 = 9 [packed = true];

  reserved 10 to 15;
}

// ============================================================================
// Count-Min Sketch Delta
// ============================================================================

// CountMinDelta carries only the matrix cells that changed by at least the
// threshold between two consecutive snapshots, plus the full per-row L1/L2
// norm deltas (one entry per row, negligible size).
//
// Cells apply additively on the receiver: matrix[row][col] += d_count. CMS
// counters only ever grow, but the delta encodes a signed count (sint64) so
// the same wire form covers weighted/decay variants.
//
// The packed cell encoding (cell_rows / cell_cols / d_counts, tags 9-11) is
// the canonical form; the legacy per-cell message (tag 3) is retained only so
// payloads from older producers still decode. This message is byte-identical
// to the Go reference implementation's CountMinDelta so the two runtimes emit
// byte-identical delta frames for identical window state (cross-language byte
// parity).
//
// CountMinDelta is structurally identical to CountSketchDelta: rows, cols, the
// packed cell encoding, per-row norm deltas, and an optional repeated hh_keys
// at the SAME tag number (6). Both sketches can track heavy hitters; whether
// hh_keys is populated is a control-plane decision (it is empty/omitted when
// heavy-hitter tracking is not enabled for this sketch).
message CountMinDelta {
  uint32                rows         = 1;
  uint32                cols         = 2;
  // Deprecated: use cell_rows/cell_cols/d_counts (tags 9-11). Retained for
  // backward-compatible decode of payloads from older producers.
  repeated CountMinCell cells_legacy = 3;
  // Per-row L1 norm deltas, length = rows.
  repeated double       l1           = 4 [packed = true];
  // Per-row L2 norm deltas, length = rows.
  repeated double       l2           = 5 [packed = true];
  // Heavy-hitter candidate keys from an upstream tracker, mirroring
  // CountSketchDelta.hh_keys (same tag number 6, same wire shape). Downstream
  // queries the merged Count-Min matrix for each key to (re)build its Top-K
  // with globally-merged estimates. Empty/omitted when heavy-hitter tracking
  // is not enabled.
  repeated string       hh_keys      = 6;
  // Packed cell encoding (canonical form):
  repeated uint32       cell_rows    = 9  [packed = true];  // row index of each changed cell
  repeated uint32       cell_cols    = 10 [packed = true];  // col index of each changed cell
  repeated sint64       d_counts     = 11 [packed = true];  // signed integer count delta
}

// CountMinCell is the deprecated per-cell delta record. Producers emit the
// packed cell arrays on CountMinDelta instead; this message exists only to
// decode payloads from older producers.
message CountMinCell {
  uint32 row     = 1;
  uint32 col     = 2;
  double d_count = 3;  // deprecated: use CountMinDelta.d_counts
  double d_sum   = 4;  // deprecated: omitted in the packed encoding
  double d_sum2  = 5;  // deprecated: omitted in the packed encoding
}
